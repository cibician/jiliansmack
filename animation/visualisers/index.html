<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualisers - Smilian Jack Cibic</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>.lightbox-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; cursor: pointer; align-items: center; justify-content: center; padding: 2rem; box-sizing: border-box; }.lightbox-overlay.open { display: flex; }.lightbox-overlay img, .lightbox-overlay video { max-width: 100%; max-height: 100%; object-fit: contain; pointer-events: auto; }.lightbox-overlay img { pointer-events: none; }</style>
</head>
<body>
    <div class="container">
        <!-- Left Navigation Column -->
        <nav class="nav-column">
            <h1 class="site-title"><a href="../../index.html">Smilian Jack Cibic</a></h1>
            <ul class="nav-menu">
                <li><a href="../../music/index.html">music</a></li>
                <li><a href="../index.html" class="active">animation</a></li>
                <li><a href="../../drawing/index.html">drawing</a></li>
                <li><a href="../../other-work/index.html">other work</a></li>
                <li><a href="../../about/index.html">about</a></li>
                <li><a href="../../contact.html">contact</a></li>
            </ul>
        </nav>

        <!-- Right Content Column -->
        <main class="content-column">
            <div class="page-content">
                <h1 class="page-title">Visualisers</h1>
                <div id="lightbox" class="lightbox-overlay" onclick="if(event.target===this){var v=document.getElementById('lightbox-video');v.pause();v.removeAttribute('src');document.getElementById('lightbox-img').style.display='';v.style.display='none';this.classList.remove('open');this.setAttribute('aria-hidden','true');}" aria-hidden="true"><img src="" alt="" id="lightbox-img"><video id="lightbox-video" controls playsinline style="display: none;" onclick="event.stopPropagation()"></video></div>
                <p class="page-description">
                    Some of the visualisers I have created for the delicatoni live shows...
                </p>
                <img src="../../img/9cc4d5ec-d871-4cf2-a178-d2e16a644684.JPG" alt="Visualiser" class="main-image" style="margin-top: 30px; cursor: pointer;" onclick="openLightbox(this)">
                <img src="../../img/afbd403c-dd2f-420f-a9f0-cc05ea71e95d.jpg" alt="Visualiser" class="main-image" style="margin-top: 30px; cursor: pointer;" onclick="openLightbox(this)">

                <video class="main-image" autoplay loop muted playsinline style="margin-top: 30px; cursor: pointer;" onclick="openLightbox(this)">
                    <source src="../../img/PUMA.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>

                <video class="main-image" autoplay loop muted playsinline style="margin-top: 30px; cursor: pointer;" onclick="openLightbox(this)">
                    <source src="../../img/1 - SCRITTA COLORI (1).mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>

                <video class="main-image" autoplay loop muted playsinline style="margin-top: 30px; cursor: pointer;" onclick="openLightbox(this)">
                    <source src="../../img/4 - LA STESSA COSA INSIEME (1).mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                
                <img src="../../img/Delicatoni-illustration-nature.GIF" alt="Delicatoni Visualiser" class="main-image" style="margin-top: 30px; cursor: pointer;" onclick="openLightbox(this)">
            </div>
            <script>function openLightbox(el){var lb=document.getElementById('lightbox');var lbImg=document.getElementById('lightbox-img');var lbVideo=document.getElementById('lightbox-video');if(el.tagName==='VIDEO'){var src=el.querySelector('source');if(src){lbVideo.src=src.src;lbVideo.load();}lbImg.style.display='none';lbVideo.style.display='block';lbVideo.play();}else{lbVideo.pause();lbVideo.removeAttribute('src');lbVideo.style.display='none';lbImg.style.display='block';lbImg.src=el.src;lbImg.alt=el.alt;}lb.classList.add('open');lb.setAttribute('aria-hidden','false');}</script>
        </main>
    </div>
</body>
</html>
